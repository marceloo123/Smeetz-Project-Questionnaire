function classify(a){
  let s={online:0,standard:0,advanced:0};
  const bl=a.businessLines||{};
  const active=BIZ_LINES.filter(l=>CHANNELS.some(c=>bl[l.id]&&bl[l.id][c]));
  if(active.length>=3)s.advanced+=3; else if(active.length===2)s.standard+=2; else s.online+=2;
  const hasOnsite=BIZ_LINES.some(l=>bl[l.id]&&bl[l.id]["Onsite"]);
  const hasOnline=BIZ_LINES.some(l=>bl[l.id]&&bl[l.id]["Online"]);
  if(hasOnsite&&hasOnline)s.standard+=2; else if(!hasOnsite)s.online+=3;
  if((a.siteCount||"").includes("4+"))s.advanced+=3; else if((a.siteCount||"").includes("2"))s.advanced+=2; else s.standard+=1;
  const hw=a.hasHardware||"";
  if(hw.startsWith("Yes")||hw.startsWith("Ja")||hw.startsWith("Oui")||hw.startsWith("Sí"))s.standard+=2; else s.online+=2;
  const integ=a.hasIntegrations||"";
  if(integ==="Yes"||integ==="Ja"||integ==="Oui"||integ==="Sí")s.advanced+=2;
  if(["Yes","Oui","Ja","Sí"].includes(a.customDev))s.advanced+=3;
  const mig=a.migrationNeeded||"";
  if(mig==="Yes"||mig==="Oui"||mig==="Ja"||mig==="Sí")s.advanced+=2;
  if((a.cutovertStrategy||"").toLowerCase().includes("phas"))s.advanced+=2; else if((a.cutovertStrategy||"").toLowerCase().includes("bang"))s.standard+=1;
  if((a.phasedRollout||"").toLowerCase().includes("phas"))s.advanced+=2;
  const max=Math.max(s.online,s.standard,s.advanced);
  return s.advanced===max?"Advanced":s.standard===max?"Standard":"Online";
}

function fmtBiz(bl){
  if(!bl)return"Not specified";
  return BIZ_LINES.map(l=>{const ac=CHANNELS.filter(c=>bl[l.id]&&bl[l.id][c]);return ac.length?l.label+": "+ac.join(" + "):null;}).filter(Boolean).join("; ")||"None";
}

function extractName(str){

async function dlDocx(md,name){
  if(!window.fflate){
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/fflate/0.8.2/fflate.min.js";
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  const{doc,rels,styles,numbering,ct,rr}=mdToDocx(md);
  const e=str=>new TextEncoder().encode(str);
  const z=fflate.zipSync({
    "[Content_Types].xml":e(ct),
    "_rels/.rels":e(rr),
    "word/document.xml":e(doc),
    "word/_rels/document.xml.rels":e(rels),
    "word/styles.xml":e(styles),
    "word/numbering.xml":e(numbering)
  });
  const blob=new Blob([z],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="Smeetz_Scoping_"+((name||"Client").replace(/\s+/g,"_"))+".docx";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const any=BIZ_LINES.some(l=>CHANNELS.some(c=>v[l.id]&&v[l.id][c]));
  return(<div>
    <table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr>
        <th style={{padding:"8px 12px",textAlign:"left",background:"#1e3a5f",color:"#fff",fontSize:13}}>Business Line</th>
        {CHANNELS.map(c=><th key={c} style={{padding:"8px 16px",textAlign:"center",background:"#1e3a5f",color:"#fff",fontSize:13}}>{c}</th>)}
      </tr></thead>
      <tbody>{BIZ_LINES.map((l,i)=>(
        <tr key={l.id} style={{background:i%2===0?"#f9fafb":"#fff"}}>
          <td style={{padding:"10px 12px",fontWeight:600,fontSize:13,color:"#374151",borderBottom:"1px solid #e5e7eb"}}>{l.label}</td>
          {CHANNELS.map(c=>{const active=v[l.id]&&v[l.id][c];return(
            <td key={c} style={{textAlign:"center",borderBottom:"1px solid #e5e7eb"}}>
              <button onClick={()=>toggle(l.id,c)} style={{width:34,height:34,borderRadius:8,border:"2px solid "+(active?"#00b4d8":"#e5e7eb"),background:active?"#00b4d8":"#fff",color:active?"#fff":"#ccc",fontSize:16,cursor:"pointer"}}>{active?"✓":""}</button>
            </td>);})}
        </tr>
      ))}</tbody>
    </table>
    {!any&&<p style={{fontSize:12,color:"#ef4444",marginTop:6}}>Please select at least one business line and channel.</p>}
  </div>);
}

function App(){
  const [lang,setLang]=useState(null);
  const [step,setStep]=useState(0);
  const [ans,setAns]=useState({});
  const [loading,setLoading]=useState(false);
  const [doc,setDoc]=useState(null);
  const [cls,setCls]=useState(null);
  const [copied,setCopied]=useState(false);
  const [dlLoad,setDlLoad]=useState(false);

  const t=lang?T[lang]:null;
  const STEPS=t?t.steps:[];
  const cur=STEPS[step];

  function chg(id,val){setAns(p=>({...p,[id]:val}));}

  function visible(f){
    if(f.id==="hardwareDetails"){const h=ans.hasHardware||"";return h.startsWith("Yes")||h.startsWith("Ja")||h.startsWith("Oui")||h.startsWith("Sí");}
    if(f.id==="customDevDetails"){const c=ans.customDev||"";return c==="Yes"||c==="Ja"||c==="Oui"||c==="Sí";}
    if(f.id==="integrationSystem"||f.id==="integrationPurpose"||f.id==="integrationData"){const i=ans.hasIntegrations||"";return i==="Yes"||i==="Ja"||i==="Oui"||i==="Sí";}
    if(["migrationSystems","migrationData","migrationVolume","migrationPeriod"].includes(f.id)){const m=ans.migrationNeeded||"";return m==="Yes"||m==="Ja"||m==="Oui"||m==="Sí";}
    if(f.id==="clientTypeOther"){const ct=ans.clientType||"";return ct.includes("Other")||ct.includes("Autre")||ct.includes("Andere")||ct.includes("Otra");}
    return true;
  }

  function canProceed(){
    if(!cur)return false;
    return cur.fields.every(f=>{
      if(!visible(f)||!f.required)return true;
      const v=ans[f.id];
      if(f.type==="bizmatrix")return v&&BIZ_LINES.some(l=>CHANNELS.some(c=>v[l.id]&&v[l.id][c]));
      return v&&String(v).trim()!=="";
    });
  }

  async function generate(){
    const c=classify(ans);setCls(c);setLoading(true);setDoc(null);
    const apiKey=window._smeetzApiKey;
    if(!apiKey){
      const key=window.prompt("Please enter your Anthropic API key to generate the document.\n\nYou can find it at: console.anthropic.com");
      if(!key){setLoading(false);return;}
      window._smeetzApiKey=key.trim();
    }
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window._smeetzApiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:prompt(ans,c)}]})});
      if(!r.ok){
        const err=await r.json();
        if(err.error?.type==="authentication_error"){window._smeetzApiKey=null;}
        throw new Error(err.error?.message||"API error "+r.status);
      }
      const d=await r.json();
      setDoc(d.content?.map(b=>b.text||"").join("")||"Error generating document.");
    }catch(e){setDoc("❌ Error: "+e.message+"\n\nPlease reload and try again with a valid API key.");}
    setLoading(false);
  }

  async function handleDl(){setDlLoad(true);try{await dlDocx(doc,ans.clientName);}catch(e){alert(e.message);}setDlLoad(false);}
  function copy(){navigator.clipboard.writeText(doc);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  function restart(){setStep(0);setAns({});setDoc(null);setCls(null);setLang(null);}

  const clrMap={Online:"#22c55e",Standard:"#f59e0b",Advanced:"#ef4444"};
  const clrDesc={Online:"Digital-only, rapid deployment (2–4 weeks).",Standard:"Physical + digital, single site (2–4 months).",Advanced:"Multi-site, multi-system, phased rollout (6+ months)."};
  const hasCD=["Yes","Oui","Ja","Sí"].includes(ans.customDev);
  const progress=STEPS.length?(step/STEPS.length)*100:0;

  function renderDoc(md){
    return md.split("\n").map((line,i,arr)=>{
      if(line.match(/^\|[-| ]+\|$/))return null;
      if(line.startsWith("# "))return <h1 key={i} style={{color:"#1e3a5f",fontSize:20,fontWeight:700,marginBottom:8}}>{line.slice(2)}</h1>;
      if(line.startsWith("## ⚠"))return <h2 key={i} style={{color:"#c0392b",marginTop:22,marginBottom:4,fontSize:16,borderBottom:"3px solid #c0392b",paddingBottom:3}}>{line.slice(3)}</h2>;
      if(line.startsWith("## "))return <h2 key={i} style={{color:"#1e3a5f",marginTop:22,marginBottom:4,fontSize:16,borderBottom:"2px solid #00b4d8",paddingBottom:3}}>{line.slice(3)}</h2>;
      if(line.startsWith("### "))return <h3 key={i} style={{color:"#0077a8",marginTop:14,marginBottom:3,fontSize:14}}>{line.slice(4)}</h3>;
      if(line.startsWith("#### "))return <h4 key={i} style={{color:"#333",marginTop:10,marginBottom:2,fontSize:13,fontStyle:"italic"}}>{line.slice(5)}</h4>;
      if(line.startsWith("> "))return <div key={i} style={{borderLeft:"4px solid #1e3a5f",paddingLeft:12,margin:"8px 0",color:"#374151",fontStyle:"italic",fontSize:12}}>{line.slice(2).replace(/\*/g,"")}</div>;
      if(line.startsWith("|")){
        const cells=line.split("|").slice(1,-1);
        const isHdr=!!(arr[i+1]||"").match(/^\|[-| ]+\|$/);
        return <tr key={i}>{cells.map((c,j)=>isHdr?<th key={j} style={{background:"#1e3a5f",color:"#fff",padding:"6px 10px",fontSize:12,textAlign:"left"}}>{c.trim()}</th>:<td key={j} style={{padding:"5px 10px",fontSize:12,borderBottom:"1px solid #e5e7eb"}}>{c.trim()}</td>)}</tr>;
      }
      if(line.startsWith("- "))return <li key={i} style={{fontSize:13,marginBottom:2,marginLeft:16}}>{line.slice(2)}</li>;
      if(line.trim()==="")return <div key={i} style={{height:6}}/>;
      return <p key={i} dangerouslySetInnerHTML={{__html:line.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")}} style={{fontSize:13,margin:"2px 0",lineHeight:1.6}}/>;
    }).filter(Boolean);
  }

  function wrapTables(els){
    const res=[];let rows=[];
    els.forEach((el,i)=>{
      if(el?.type==="tr"){rows.push(el);}
      else{if(rows.length){res.push(<table key={"t"+i} style={{width:"100%",borderCollapse:"collapse",margin:"8px 0",border:"1px solid #e5e7eb"}}><tbody>{rows}</tbody></table>);rows=[];}res.push(el);}
    });
    if(rows.length)res.push(<table key="tend" style={{width:"100%",borderCollapse:"collapse",margin:"8px 0",border:"1px solid #e5e7eb"}}><tbody>{rows}</tbody></table>);
    return res;
  }

  const btn=(label,onClick,opts={})=>(
    <button onClick={onClick} disabled={opts.disabled} style={{padding:"10px "+(opts.wide?"28px":"18px"),borderRadius:8,border:opts.outline?"1.5px solid #00b4d8":"none",background:opts.disabled?"#9ca3af":opts.outline?"#fff":opts.color||"#1e3a5f",color:opts.outline?"#00b4d8":"#fff",fontWeight:700,fontSize:13,cursor:opts.disabled?"not-allowed":"pointer"}}>{label}</button>
  );

  if(!lang)return(
    <div style={{fontFamily:"Inter,system-ui,sans-serif",minHeight:"100vh",background:"#f0f4f8",display:"flex",flexDirection:"column"}}>
      <div style={{background:"#1e3a5f",color:"#fff",padding:"16px 24px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{background:"#00b4d8",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:18}}>S</div>
        <div><div style={{fontWeight:700,fontSize:16}}>Smeetz Implementation Scoping</div><div style={{fontSize:12,opacity:.8}}>Sales → Implementation Handover Tool</div></div>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:32}}>
        <div style={{background:"#fff",borderRadius:20,boxShadow:"0 4px 32px rgba(0,0,0,.1)",padding:"48px 40px",maxWidth:480,width:"100%",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:16}}>🌍</div>
          <h2 style={{color:"#1e3a5f",fontSize:22,marginBottom:8}}>Select your language</h2>
          <p style={{color:"#6b7280",fontSize:14,marginBottom:32}}>Questionnaire in your language.<br/>Scoping document always generated in <strong>English</strong>.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {Object.entries(T).map(([code,tr])=>(
              <button key={code} onClick={()=>setLang(code)} style={{padding:"18px 12px",borderRadius:12,border:"2px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:16,fontWeight:600,color:"#1e3a5f"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#00b4d8";e.currentTarget.style.background="#f0f9ff";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="#e5e7eb";e.currentTarget.style.background="#fff";}}>
                {tr.langLabel}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  const inp={width:"100%",padding:"10px 12px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"};

  return(
    <div style={{fontFamily:"Inter,system-ui,sans-serif",minHeight:"100vh",background:"#f0f4f8",display:"flex",flexDirection:"column"}}>
      <div style={{background:"#1e3a5f",color:"#fff",padding:"16px 24px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{background:"#00b4d8",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:18}}>S</div>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:16}}>Smeetz Implementation Scoping</div><div style={{fontSize:12,opacity:.8}}>{t.appSubtitle}</div></div>
        <button onClick={()=>{setLang(null);setStep(0);setAns({});setDoc(null);}} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12}}>{T[lang].langLabel} ▾</button>
      </div>

      {!doc?(
        <div style={{flex:1,display:"flex",justifyContent:"center",padding:"32px 16px"}}>
          <div style={{width:"100%",maxWidth:680}}>
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b7280",marginBottom:6}}>
                <span>{t.stepOf(step+1,STEPS.length)}</span><span>{Math.round(progress)}{t.complete}</span>
              </div>
              <div style={{height:6,background:"#e5e7eb",borderRadius:99}}><div style={{height:6,background:"#00b4d8",borderRadius:99,width:progress+"%",transition:"width .3s"}}/></div>
              <div style={{display:"flex",gap:4,marginTop:8}}>
                {STEPS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:99,background:i<=step?"#00b4d8":"#e5e7eb",cursor:i<step?"pointer":"default"}} onClick={()=>i<step&&setStep(i)}/>)}
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:16,boxShadow:"0 4px 24px rgba(0,0,0,.08)",padding:32}}>
              <div style={{fontSize:24,marginBottom:4}}>{cur.icon}</div>
              <h2 style={{color:"#1e3a5f",margin:"0 0 24px",fontSize:20,fontWeight:700}}>{cur.title}</h2>
              {cur.fields.filter(f=>visible(f)).map(f=>(
                <div key={f.id} style={{marginBottom:20}}>
                  <label style={{display:"block",fontWeight:600,fontSize:13,color:"#374151",marginBottom:6}}>{f.label}{f.required&&<span style={{color:"#ef4444"}}> *</span>}</label>
                  {f.type==="bizmatrix"&&<div><p style={{fontSize:12,color:"#6b7280",marginBottom:8}}>{t.bizLinesHint}</p><BizMatrix value={ans[f.id]} onChange={v=>chg(f.id,v)}/></div>}
                  {f.type==="text"&&<input value={ans[f.id]||""} onChange={e=>chg(f.id,e.target.value)} placeholder={f.placeholder||""} style={inp}/>}
                  {f.type==="textarea"&&<textarea value={ans[f.id]||""} onChange={e=>chg(f.id,e.target.value)} placeholder={f.placeholder||""} rows={3} style={{...inp,resize:"vertical"}}/>}
                  {f.type==="select"&&<select value={ans[f.id]||""} onChange={e=>chg(f.id,e.target.value)} style={{...inp,background:"#fff"}}><option value="">{t.select}</option>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
                </div>
              ))}
              {hasCD&&cur.title.toLowerCase().includes("integr")&&(
                <div style={{background:"#fef2f2",border:"2px solid #fca5a5",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}}>
                  <span style={{fontSize:20}}>⚠️</span>
                  <div><div style={{fontWeight:700,color:"#c0392b",fontSize:13}}>Custom Development flagged</div>
                  <div style={{fontSize:12,color:"#7f1d1d",marginTop:2}}>Will be highlighted as additional scope in the document and requires product team validation.</div></div>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:28}}>
                {btn(t.back,()=>setStep(s=>s-1),{disabled:step===0,outline:true})}
                {step<STEPS.length-1
                  ?btn(t.next,()=>setStep(s=>s+1),{disabled:!canProceed(),color:"#1e3a5f",wide:true})
                  :btn(t.generate,generate,{disabled:!canProceed(),color:"#00b4d8",wide:true})
                }
              </div>
            </div>
          </div>
        </div>
      ):loading?(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{width:56,height:56,border:"5px solid #e5e7eb",borderTop:"5px solid #00b4d8",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
          <div style={{color:"#1e3a5f",fontWeight:600}}>{t.generating}</div>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      ):(
        <div style={{flex:1,padding:"24px 16px",display:"flex",justifyContent:"center"}}>
          <div style={{width:"100%",maxWidth:860}}>
            <div style={{background:"#fff",borderRadius:12,padding:"16px 24px",marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#6b7280",marginBottom:4,letterSpacing:.5}}>{t.classifiedAs}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <span style={{background:clrMap[cls],color:"#fff",padding:"4px 16px",borderRadius:99,fontWeight:700,fontSize:15}}>{cls}</span>
                    <span style={{fontSize:12,color:"#374151"}}>{clrDesc[cls]}</span>
                    {hasCD&&<span style={{background:"#fef2f2",color:"#c0392b",border:"1px solid #fca5a5",padding:"4px 12px",borderRadius:99,fontWeight:700,fontSize:12}}>⚠️ Custom Dev</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {btn(copied?t.copied:t.copyMd,copy,{outline:true})}
                  {btn(dlLoad?t.downloading:t.downloadDocx,handleDl,{disabled:dlLoad,color:"#00b4d8"})}
                  {btn(t.newProject,restart)}
                </div>
              </div>
              {hasCD&&<div style={{marginTop:10,padding:"10px 14px",background:"#fef2f2",borderRadius:8,border:"1px solid #fca5a5",fontSize:12,color:"#c0392b",fontWeight:600,display:"flex",gap:8}}><span>⚠️</span><span>Custom development included — see Section 10 in the document.</span></div>}
              <div style={{marginTop:8,padding:"8px 14px",background:"#f0f9ff",borderRadius:8,border:"1px solid #bae6fd",fontSize:12,color:"#0369a1",display:"flex",gap:8}}><span>📁</span><span>{t.docxHint}</span></div>
            </div>
            <div style={{background:"#fff",borderRadius:16,boxShadow:"0 4px 24px rgba(0,0,0,.08)",padding:"40px 48px",lineHeight:1.6}}>
              {wrapTables(renderDoc(doc))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
